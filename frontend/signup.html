<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Hub - Signup</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="page">
        <h1>Client Hub</h1>
        <p>Create admin account</p>
      </div>
    </header>

    <main class="content">
      <div class="page">
        <div class="message" data-message></div>

        <section class="box auth-box">
          <h2>Signup</h2>
          <p class="simple-text">Create an admin account first, then login to use the dashboard.</p>

          <form id="signupForm">
            <div class="form-grid">
              <label class="full">
                Username
                <input type="text" name="username" required />
              </label>
              <label class="full">
                Password
                <input type="password" name="password" required />
              </label>
            </div>

            <div class="button-row">
              <button type="submit">Create account</button>
              <a href="/frontend/index.html">Back to login</a>
            </div>
          </form>
        </section>
      </div>
    </main>

    <script src="/frontend/shared.js"></script>
    <script src="/frontend/signup.js"></script>
  </body>
</html>
