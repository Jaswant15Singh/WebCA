<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Hub - Payment Success</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="page">
        <h1>Client Hub</h1>
        <p data-auth-text>Not logged in</p>
        <nav class="nav">
          <a href="./dashboard.html">Dashboard</a>
          <a href="./clients.html">Clients</a>
          <a href="./projects.html">Projects</a>
          <a href="./invoices.html" class="active">Invoices</a>
          <a href="./notifications.html">Notifications</a>
          <button type="button" data-logout>Logout</button>
        </nav>
      </div>
    </header>

    <main class="content">
      <div class="page">
        <div class="message" data-message></div>

        <section class="box">
          <h2>Payment Status</h2>
          <p class="simple-text">The app is checking your returned payment and updating the database.</p>
        </section>

        <section class="box">
          <div class="amount-box">
            <p><strong>Project:</strong> <span id="successProjectName">-</span></p>
            <p><strong>Paid now:</strong> <span id="successPaidNow">-</span></p>
            <p><strong>Total paid:</strong> <span id="successTotalPaid">-</span></p>
            <p><strong>Remaining amount:</strong> <span id="successRemaining">-</span></p>
          </div>

          <div class="button-row">
            <a href="./invoices.html">Back to invoices</a>
          </div>
        </section>
      </div>
    </main>

    <script src="./shared.js"></script>
    <script src="./payment-success.js"></script>
  </body>
</html>
