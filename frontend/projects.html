<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client Hub - Projects</title>
    <link rel="stylesheet" href="/frontend/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="page">
        <h1>Client Hub</h1>
        <p data-auth-text>Not logged in</p>
        <nav class="nav">
          <a href="/frontend/dashboard.html">Dashboard</a>
          <a href="/frontend/clients.html">Clients</a>
          <a href="/frontend/projects.html" class="active">Projects</a>
          <a href="/frontend/invoices.html">Invoices</a>
          <a href="/frontend/notifications.html">Notifications</a>
          <button type="button" data-logout>Logout</button>
        </nav>
      </div>
    </header>

    <main class="content">
      <div class="page">
        <div class="message" data-message></div>

        <div class="two-column">
          <section class="box">
            <h2>Project form</h2>
            <p class="simple-text">Create or update projects here.</p>

            <form id="projectForm">
              <input type="hidden" name="project_id" />
              <div class="form-grid">
                <label>
                  Title
                  <input type="text" name="title" required />
                </label>
                <label>
                  Client
                  <select name="client_id" id="clientSelect" required>
                    <option value="">Select client</option>
                  </select>
                </label>
                <label>
                  Type
                  <select name="type" required>
                    <option value="fixed">fixed</option>
                    <option value="retainer">retainer</option>
                    <option value="hourly">hourly</option>
                  </select>
                </label>
                <label>
                  Status
                  <select name="status" required>
                    <option value="draft">draft</option>
                    <option value="active">active</option>
                    <option value="on_hold">on_hold</option>
                    <option value="completed">completed</option>
                    <option value="cancelled">cancelled</option>
                  </select>
                </label>
                <label>
                  Start date
                  <input type="date" name="start_date" />
                </label>
                <label>
                  Deadline
                  <input type="date" name="deadline" />
                </label>
                <label>
                  Budget
                  <input type="number" name="budget" min="0" step="0.01" required />
                </label>
                <label>
                  Paid amount
                  <input type="number" name="paid_amount" min="0" step="0.01" value="0" />
                </label>
                <label>
                  Currency
                  <input type="text" name="budget_currency" value="EUR" />
                </label>
                <label>
                  Tags
                  <input type="text" name="tags" />
                </label>
                <label class="full">
                  Description
                  <textarea name="description"></textarea>
                </label>
                <label class="full">
                  Brief
                  <textarea name="brief"></textarea>
                </label>
                <label class="full">
                  Cover image
                  <input type="file" name="cover_image_url" accept="image/*" />
                </label>
              </div>

              <div class="button-row">
                <button type="submit">Save project</button>
                <button type="button" id="clearProjectForm" class="secondary">Clear</button>
              </div>
            </form>
          </section>

          <section class="box">
            <h2>Project list</h2>
            <div class="button-row">
              <button type="button" id="refreshProjects">Refresh</button>
            </div>
            <div id="projectList" class="list"></div>
          </section>
        </div>
      </div>
    </main>

    <script src="/frontend/shared.js"></script>
    <script src="/frontend/projects.js"></script>
  </body>
</html>
